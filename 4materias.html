<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/style4.css">
    <title>Matérias</title>
</head>
<body>
    <div class="inicial">
        <div class="principal">
            <img src="./images/fundo_preto.png" alt="tela de inicio">

            <i class="bx bx-arrow-big-left-line btn-voltar" onclick="window.location.href='./3curso.html'"></i>

            <h1 id="configure">Configure o modo aula</h1>

            <div class="barra-progresso-curso">
                <div class="step-atual"></div>
                <div class="step-meio"></div>
                <div class="step"></div>
            </div>
            
            <div class="topo-horario">
                <h1>Horário de aulas</h1>
                <p>Adicione matérias e horários</p>
            </div>

            <div>
                <i class="bx bx-calendar" ></i>
            </div>
            
            <p id="informe-materia">Nenhuma matéria adicionada</p>

            <button onclick="window.location.href='./5informar-aula.html'"id="adicionar">Adicionar matérias</button>

            <div>
                <h2 class="falso">Continuar</h2>
            </div>
        </div>
    </div>
</body>
</html>
