<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/style8.css">
    <title>Tela Inicial Modo aula</title>
</head>
<body>
    <div class="inicial">
        <div class="principal">
            <img src="./images/modo-aula.png" alt="tela de inicio">

            <button class="btn-sair" onclick="window.location.href='./10sair.html'">
                <i class="bx bx-chevron-down"></i> Modo Aula
            </button>

            <div class="info-curso">
                <i class='bx bx-book-open'></i>
                <div class="info-curso-textos">
                    <span id="nome-curso"></span>
                    <span id="nome-materia"></span>
                </div>
            </div>

            <div class="gravando-audio" id="gravando-audio" style="display: none;">
                <i class="bx bx-equalizer"></i>
                <span id="timer">00:00</span>
            </div>

            <div class="btns-centro">
                <button class="btn-camera" onclick="window.location.href='./8home.html'">
                    <i class="bx bx-camera-alt"></i> Câmera
                </button>
                <button class="btn-documento" onclick="window.location.href='./9documento.html'">
                    <i class="bx bx-scan"></i> Documento
                </button>
            </div>

            <button class="btn-audio" id="btn-audio">
                <i class="bx bx-microphone"></i>
                <span id="btn-audio-texto">Gravar áudio da aula</span>
            </button>
        </div>
    </div>

    <script>
        const nomeCurso = sessionStorage.getItem('nomeCurso') || '';
        const aulas = JSON.parse(sessionStorage.getItem('aulas') || '[]');
        const nomeMateria = aulas.length > 0 ? aulas[0].materia : '';

        document.getElementById('nome-curso').textContent = nomeCurso;
        document.getElementById('nome-materia').textContent = nomeMateria;

        const gravandoAudio = document.getElementById('gravando-audio');
        const btnAudio = document.getElementById('btn-audio');
        const btnAudioTexto = document.getElementById('btn-audio-texto');
        let intervalo = null;

        function atualizarTimer() {
            const startTime = parseInt(sessionStorage.getItem('audioStartTime'));
            if (!startTime) return;
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const min = String(Math.floor(diff / 60)).padStart(2, '0');
            const seg = String(diff % 60).padStart(2, '0');
            document.getElementById('timer').textContent = `${min}:${seg}`;
        }

        if (sessionStorage.getItem('audioStartTime')) {
            gravandoAudio.style.display = 'flex';
            btnAudioTexto.textContent = 'Parar gravação';
            btnAudio.classList.add('btn-audio-parar');
            atualizarTimer();
            intervalo = setInterval(atualizarTimer, 1000);
        }

        btnAudio.addEventListener('click', function () {
            if (sessionStorage.getItem('audioStartTime')) {
                sessionStorage.removeItem('audioStartTime');
                clearInterval(intervalo);
                gravandoAudio.style.display = 'none';
                btnAudioTexto.textContent = 'Gravar áudio da aula';
                btnAudio.classList.remove('btn-audio-parar');
                document.getElementById('timer').textContent = '00:00';
            } else {
                sessionStorage.setItem('audioStartTime', Date.now());
                gravandoAudio.style.display = 'flex';
                btnAudioTexto.textContent = 'Parar gravação';
                btnAudio.classList.add('btn-audio-parar');
                atualizarTimer();
                intervalo = setInterval(atualizarTimer, 1000);
            }
        });
    </script>
</body>
</html>
