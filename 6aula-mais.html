<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/style6.css">
    <title>Mais aulas</title>
</head>
<body>
    <div class="inicial">
        <div class="principal">
            <img src="./images/fundo_preto.png" alt="tela de inicio">

            <i class="bx bx-arrow-big-left-line btn-voltar" onclick="window.location.href='./4materias.html'"></i>

            <h1 id="configure">Configure o modo aula</h1>

            <div class="barra-progresso-curso">
                <div class="step-atual"></div>
                <div class="step-meio"></div>
                <div class="step"></div>
            </div>

            <div class="topo-horario">
                <h1>Horário de aulas</h1>
                <p>Adicione matérias e horários</p>
            </div>

            <div id="lista-aulas"></div>

            <div class="botoes-adicionar-materia">
                <button type="button" onclick="window.location.href='./5informar-aula.html'" id="mais">+</button>
            </div>

            <button class="btn-continuar" onclick="continuar()">Continuar</button>
        </div>
    </div>

    <script>
        function renderizarAulas() {
            const aulas = JSON.parse(sessionStorage.getItem('aulas') || '[]');
            const lista = document.getElementById('lista-aulas');
            lista.innerHTML = '';

            aulas.forEach(function (aula, index) {
                const div = document.createElement('div');
                div.classList.add('materia-adicionada');
                div.innerHTML = `
                    <div class="icone-materia">
                        <i class='bx bx-book-open'></i>
                    </div>
                    <div class="info-aula">
                        <span class="nome-materia">${aula.materia}</span>
                        <span class="dia-materia">${aula.dia}</span>
                        <span class="horario-materia">
                            <i class='bx bx-clock'></i>
                            ${aula.inicioHora}:${aula.inicioMin} - ${aula.terminoHora}:${aula.terminoMin}
                        </span>
                    </div>
                    <i class="bx bx-trash lixeira" onclick="removerAula(${index})"></i>
                `;
                lista.appendChild(div);
            });
        }

        function removerAula(index) {
            const aulas = JSON.parse(sessionStorage.getItem('aulas') || '[]');
            aulas.splice(index, 1);
            sessionStorage.setItem('aulas', JSON.stringify(aulas));
            renderizarAulas();
        }

        function continuar() {
            const aulas = JSON.parse(sessionStorage.getItem('aulas') || '[]');

            if (aulas.length === 0) {
                alert('Adicione pelo menos uma aula antes de continuar!');
                return;
            }

            window.location.href = './7revisao-aulas.html';
        }

        renderizarAulas();
    </script>
</body>
</html>
